{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Portfolio{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'projects/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'projects:project_list' %}" class="logo">
                <span class="logo-text">DEV<span class="highlight">PORTFOLIO</span></span>
            </a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; {% now "Y" %} Joy Magdy. All rights reserved.</p>
    </footer>

    <script src="{% static 'projects/script.js' %}"></script>
</body>
</html>
