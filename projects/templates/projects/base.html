{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Portfolio{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'projects/style.css' %}">
</head>
<body>
    <div id="particles-js"></div>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#home" class="logo">
                <span class="logo-text">JOY<span class="highlight">MAGDY</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="{% url 'projects:project_list' %}#home" class="nav-link active">Home</a></li>
                <li><a href="{% url 'projects:project_list' %}#about" class="nav-link">About</a></li>
                <li><a href="{% url 'projects:project_list' %}#skills" class="nav-link">Skills</a></li>
                <li><a href="{% url 'projects:project_list' %}#projects" class="nav-link">Projects</a></li>
                <li><a href="{% url 'projects:project_list' %}#contact" class="nav-link">Contact</a></li>
                <li><a href="{% static 'projects/resume.pdf' %}" target="_blank" class="nav-link resume-btn">Resume</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; {% now "Y" %} Joy Magdy. All rights reserved.</p>
    </footer>

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="{% static 'projects/script.js' %}"></script>
</body>
</html>
